name: Smoke Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pipeline smoke test (synthetic data, no API)
        run: python tests/smoke_test.py

      - name: Per-pattern smoke test (5 v1.5 detectors)
        run: python tests/smoke_test_new_patterns.py

      - name: Pipeline integration smoke test (mocked Polygon)
        run: python tests/smoke_test_pipeline.py

      - name: State machine + active-monitor smoke test
        run: python tests/smoke_test_state.py
