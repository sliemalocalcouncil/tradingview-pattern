name: Stock Pattern Scan

on:
  # Manual trigger from the UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Telegram messages)"
        required: false
        default: "false"
      debug:
        description: "Verbose logging"
        required: false
        default: "false"

  # Scheduled — every 30 minutes during US market hours.
  # NOTE: GitHub Actions cron runs in UTC. Regular session = 13:30 UTC (EDT) → 20:00 UTC.
  # This schedule covers 14:00 UTC to 20:30 UTC at :00 and :30, Mon–Fri,
  # which is dense enough for Starter (no rate limit) without exhausting GH Actions minutes.
  schedule:
    - cron: "0,30 14-20 * * 1-5"

permissions:
  contents: write   # to commit result/ updates back

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Starter+ Polygon plan: unlimited rate limit. Override to 5 if on Free tier.
      POLYGON_REQ_PER_MIN: ${{ vars.POLYGON_REQ_PER_MIN || '0' }}
      MIN_CANDIDATE_SCORE: ${{ vars.MIN_CANDIDATE_SCORE || '60' }}
      MIN_ALERT_SCORE: ${{ vars.MIN_ALERT_SCORE || '70' }}
      ENABLED_PATTERNS: ${{ vars.ENABLED_PATTERNS || '' }}
      HOURLY_ALIGNMENT_MODE: ${{ vars.HOURLY_ALIGNMENT_MODE || 'et_aligned' }}
      MIN_DOLLAR_VOLUME: ${{ vars.MIN_DOLLAR_VOLUME || '10000000' }}
      DAILY_LOOKBACK_DAYS: ${{ vars.DAILY_LOOKBACK_DAYS || '500' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      DEBUG: ${{ github.event.inputs.debug || 'false' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity-check secrets
        run: |
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "::error::POLYGON_API_KEY is missing. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          if [ "$DRY_RUN" != "true" ] && { [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; }; then
            echo "::warning::Telegram credentials missing — will skip alert sending."
          fi

      - name: Run scan
        run: python scripts/scan.py

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result/
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "chore(scan): update results [skip ci]"
            # Pull rebase in case forward-returns workflow committed in parallel
            git pull --rebase --autostash origin "${GITHUB_REF#refs/heads/}" || true
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: |
            result/scan_*.csv
            result/run_summary_*.json
            result/latest_run_summary.json
            result/latest_top_signals.csv
          if-no-files-found: ignore
          retention-days: 30
