name: Forward Returns Tracker

on:
  workflow_dispatch:
  schedule:
    # Hourly during US market hours, plus a sweep after EOD (21:30 UTC)
    - cron: "45 14-21 * * 1-5"
    - cron: "30 22 * * 1-5"
    # 5 hours after EOD on next-day for ret_1d, ret_3d, ret_5d sweeps
    - cron: "30 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: forward-returns
  cancel-in-progress: false

jobs:
  update_returns:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      POLYGON_REQ_PER_MIN: ${{ vars.POLYGON_REQ_PER_MIN || '0' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update forward returns
        run: python scripts/record_forward_returns.py

      - name: Commit results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result/signals_log.csv || true
          if git diff --cached --quiet; then
            echo "No forward-return updates to commit."
          else
            git commit -m "chore(returns): update forward returns [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF#refs/heads/}" || true
            git push
          fi
